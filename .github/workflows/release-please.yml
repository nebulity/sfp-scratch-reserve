name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Move v0 major tag
        if: steps.release.outputs.release_created == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update major version tags
        if: steps.release.outputs.release_created == 'true'
        run: |
          major=$(echo "${{ steps.release.outputs.major }}" | head -1)
          git tag -f "v${major}" "${{ steps.release.outputs.tag_name }}"
          git push origin "v${major}" --force
          # Keep v0 pointing to latest for backwards compatibility
          if [ "$major" != "0" ]; then
            git tag -f v0 "${{ steps.release.outputs.tag_name }}"
            git push origin v0 --force
          fi
