name: sfp-scratch-reserve
description: Fetches and reserves a pooled scratch org via sfp, then releases it in the post step.

inputs:
  pool-tag:
    description: Scratch org pool tag.
    required: true
  devhub-alias:
    description: Dev Hub alias or username used by sf/sfp commands.
    required: false
    default: ""
  scratch-alias:
    description: Alias assigned to the reserved scratch org.
    required: false
    default: "scratch"
  set-default-target-org:
    description: Set reserved scratch org as default target org.
    required: false
    default: "true"
  fetch-attempts:
    description: Number of fetch attempts before failing (60s delay between retries).
    required: false
    default: "1"

outputs:
  scratch-username:
    description: Reserved scratch org username.
  scratch-alias:
    description: Alias assigned to the reserved scratch org.

runs:
  using: node20
  main: dist/main.js
  post: dist/post.js
